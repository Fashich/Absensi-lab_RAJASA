services:
  # Backend Service (PHP API)
  - type: web
    name: absensi-backend
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /api/auth/check_connection.php
    buildCommand: ""

  # Frontend Service (React App)
  - type: web
    name: absensi-frontend
    runtime: static
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://absensi-backend.onrender.com  # Ganti dengan URL backend setelah selesai di-deploy

databases:
  - name: absensi-db
    region: singapore
    plan: free
    databaseName: absensi_db